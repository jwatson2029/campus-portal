<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPA Calculator — Popup</title>
  <link rel="stylesheet" href="modal.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      min-width: 340px;
      max-width: 420px;
      font-family: var(--igpa-font, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif);
      background: var(--igpa-bg);
      color: var(--igpa-text);
    }

    /* ── Popup header ──────────────────────── */
    .popup-header {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 14px 16px 12px;
      background: var(--igpa-bg-glass, var(--igpa-bg-2));
      border-bottom: 1px solid var(--igpa-border);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .popup-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--igpa-accent, #4f6ef7) 0%, #7c3aed 100%);
      font-size: 17px;
      line-height: 1;
      flex-shrink: 0;
    }

    .popup-title-group { flex: 1; min-width: 0; }

    .popup-title {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--igpa-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .popup-title-sub {
      font-size: 10.5px;
      color: var(--igpa-text-muted);
      margin-top: 1px;
    }

    /* ── GPA cards ─────────────────────────── */
    .popup-body { padding: 14px 14px 10px; }

    .popup-gpa-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .popup-body .igpa-card {
      padding: 16px 12px 14px;
      border-radius: 12px;
    }

    .popup-body .igpa-card-value { font-size: 32px; letter-spacing: -1.5px; }
    .popup-body .igpa-card-label { font-size: 9.5px; margin-bottom: 6px; }
    .popup-body .igpa-card-sub   { font-size: 10.5px; margin-top: 6px; }

    /* ── No-grades placeholder ─────────────── */
    .popup-no-grades {
      text-align: center;
      color: var(--igpa-text-muted);
      font-style: italic;
      padding: 20px 8px;
      font-size: 12.5px;
      line-height: 1.5;
    }

    /* ── Course list ───────────────────────── */
    .popup-course-list {
      font-size: 12.5px;
      border-top: 1px solid var(--igpa-border);
      padding-top: 10px;
    }

    .popup-course-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 4px;
      border-bottom: 1px solid var(--igpa-border);
      transition: background 0.12s;
      border-radius: 6px;
    }

    .popup-course-row:hover { background: var(--igpa-accent-soft, rgba(79,110,247,0.08)); }
    .popup-course-row:last-child { border-bottom: none; }

    .popup-course-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 10px;
      font-weight: 500;
      color: var(--igpa-text);
    }

    .popup-course-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .popup-pct {
      font-size: 11px;
      color: var(--igpa-text-muted);
      font-weight: 500;
      min-width: 36px;
      text-align: right;
    }

    /* ── Action button ─────────────────────── */
    .popup-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .popup-actions .igpa-btn {
      flex: 1;
      justify-content: center;
      font-size: 12.5px;
      padding: 8px 12px;
    }

    /* ── Footer ────────────────────────────── */
    .popup-footer {
      padding: 8px 14px;
      font-size: 10.5px;
      color: var(--igpa-text-muted);
      border-top: 1px solid var(--igpa-border);
      background: var(--igpa-bg-2);
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <div class="popup-logo">🧮</div>
    <div class="popup-title-group">
      <div class="popup-title">Infinite GPA Calculator</div>
      <div class="popup-title-sub">Infinite Campus grade tracker</div>
    </div>
  </div>

  <div class="popup-body" id="popup-body">
    <div class="popup-gpa-row">
      <div class="igpa-card igpa-card-uw">
        <div class="igpa-card-label">Unweighted</div>
        <div class="igpa-card-value" id="popup-uw">—</div>
        <div class="igpa-card-sub">4.0 scale</div>
      </div>
      <div class="igpa-card igpa-card-w">
        <div class="igpa-card-label">Weighted</div>
        <div class="igpa-card-value" id="popup-w">—</div>
        <div class="igpa-card-sub">AP / Honors</div>
      </div>
    </div>

    <div id="popup-courses" class="popup-course-list"></div>

    <div class="popup-actions">
      <button class="igpa-btn igpa-btn-primary" id="popup-open-page">Open Full Calculator</button>
    </div>
  </div>

  <div class="popup-footer" id="popup-footer">Loading…</div>

  <script src="modal.js"></script>
</body>
</html>
