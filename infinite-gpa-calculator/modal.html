<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPA Calculator — Popup</title>
  <link rel="stylesheet" href="modal.css" />
  <style>
    /* Popup-specific overrides (no overlay needed in popup window) */
    body {
      margin: 0;
      padding: 0;
      min-width: 360px;
      max-width: 500px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--igpa-bg);
      color: var(--igpa-text);
    }

    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      background: var(--igpa-bg-2);
      border-bottom: 1px solid var(--igpa-border);
    }

    .popup-title {
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .popup-settings-link {
      font-size: 12px;
      color: var(--igpa-accent);
      text-decoration: none;
      cursor: pointer;
    }

    .popup-settings-link:hover { text-decoration: underline; }

    .popup-body { padding: 14px 16px; }

    .popup-gpa-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .popup-no-grades {
      text-align: center;
      color: var(--igpa-text-muted);
      font-style: italic;
      padding: 24px 0;
      font-size: 13px;
    }

    .popup-course-list {
      font-size: 13px;
      border-top: 1px solid var(--igpa-border);
      padding-top: 10px;
    }

    .popup-course-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--igpa-border);
    }

    .popup-course-row:last-child { border-bottom: none; }

    .popup-course-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 8px;
    }

    .popup-course-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .popup-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .popup-actions .igpa-btn { flex: 1; justify-content: center; font-size: 12px; }

    .popup-footer {
      padding: 8px 16px;
      font-size: 11px;
      color: var(--igpa-text-muted);
      border-top: 1px solid var(--igpa-border);
      background: var(--igpa-bg-2);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <div class="popup-title">📊 Infinite GPA Calculator</div>
    <a class="popup-settings-link" id="popup-open-options">⚙ Settings</a>
  </div>

  <div class="popup-body" id="popup-body">
    <div class="popup-gpa-row">
      <div class="igpa-card igpa-card-uw">
        <div class="igpa-card-label">Unweighted</div>
        <div class="igpa-card-value" id="popup-uw">—</div>
        <div class="igpa-card-sub">4.0 scale</div>
      </div>
      <div class="igpa-card igpa-card-w">
        <div class="igpa-card-label">Weighted</div>
        <div class="igpa-card-value" id="popup-w">—</div>
        <div class="igpa-card-sub">AP / Honors</div>
      </div>
    </div>

    <div id="popup-courses" class="popup-course-list"></div>

    <div class="popup-actions">
      <button class="igpa-btn igpa-btn-primary" id="popup-open-page">Open Full Calculator</button>
    </div>
  </div>

  <div class="popup-footer" id="popup-footer">Loading…</div>

  <script src="modal.js"></script>
</body>
</html>
