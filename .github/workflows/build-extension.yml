name: Build Infinite GPA Calculator

# ──────────────────────────────────────────────────────────────
# Triggers: every push to main or any copilot/** branch,
# and on every PR against main.
# You can also trigger it manually from the Actions tab.
# ──────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - "copilot/**"
    paths:
      - "infinite-gpa-calculator/**"
      - ".github/workflows/build-extension.yml"
  pull_request:
    branches:
      - main
    paths:
      - "infinite-gpa-calculator/**"
      - ".github/workflows/build-extension.yml"
  workflow_dispatch:   # manual "Run workflow" button in the Actions UI

jobs:
  build:
    name: Package Extension ZIP
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1. Check out the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Validate manifest.json is valid JSON
      - name: Validate manifest.json
        run: |
          echo "Validating manifest.json..."
          python3 -c "
          import json, sys
          with open('infinite-gpa-calculator/manifest.json') as f:
              data = json.load(f)
          assert data.get('manifest_version') == 3, 'Expected manifest_version 3'
          assert 'name' in data, 'Missing name field'
          assert 'version' in data, 'Missing version field'
          print(f'  ✓ manifest_version: {data[\"manifest_version\"]}')
          print(f'  ✓ name:             {data[\"name\"]}')
          print(f'  ✓ version:          {data[\"version\"]}')
          print('manifest.json is valid.')
          "

      # 3. Verify all required files exist
      - name: Verify required files
        run: |
          echo "Checking required extension files..."
          required=(
            "infinite-gpa-calculator/manifest.json"
            "infinite-gpa-calculator/content.js"
            "infinite-gpa-calculator/background.js"
            "infinite-gpa-calculator/inject-button.js"
            "infinite-gpa-calculator/modal.html"
            "infinite-gpa-calculator/modal.js"
            "infinite-gpa-calculator/modal.css"
            "infinite-gpa-calculator/options.html"
            "infinite-gpa-calculator/options.js"
            "infinite-gpa-calculator/icons/icon-16.png"
            "infinite-gpa-calculator/icons/icon-48.png"
            "infinite-gpa-calculator/icons/icon-128.png"
          )
          all_ok=true
          for f in "${required[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✓ $f"
            else
              echo "  ✗ MISSING: $f"
              all_ok=false
            fi
          done
          if [ "$all_ok" = false ]; then
            echo "ERROR: One or more required files are missing."
            exit 1
          fi
          echo "All required files present."

      # 4. Create the ZIP archive
      #    The ZIP contains the extension folder directly so Chrome can load it.
      - name: Create ZIP archive
        run: |
          cd infinite-gpa-calculator
          zip -r ../infinite-gpa-calculator.zip . \
            --exclude "*.git*" \
            --exclude "__MACOSX*" \
            --exclude "*.DS_Store"
          cd ..
          echo "Archive size: $(du -sh infinite-gpa-calculator.zip | cut -f1)"
          echo "Archive contents:"
          unzip -l infinite-gpa-calculator.zip

      # 5. Upload the ZIP as a workflow artifact
      #    After the workflow completes, click the run → scroll to Artifacts → download.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: infinite-gpa-calculator
          path: infinite-gpa-calculator.zip
          retention-days: 30   # keep for 30 days
          if-no-files-found: error

      # 6. Print a helpful summary in the workflow log
      - name: Build summary
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "  ✅  Infinite GPA Calculator built!"
          echo "════════════════════════════════════════════"
          echo ""
          echo "  📦  Artifact:  infinite-gpa-calculator.zip"
          echo "  📅  Built at:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  🔖  Commit:    ${{ github.sha }}"
          echo "  🌿  Branch:    ${{ github.ref_name }}"
          echo ""
          echo "  HOW TO INSTALL:"
          echo "  1. Go to the Actions tab → this workflow run"
          echo "  2. Scroll to Artifacts and click 'infinite-gpa-calculator'"
          echo "  3. Unzip and load in chrome://extensions/ (Developer mode ON)"
          echo ""
